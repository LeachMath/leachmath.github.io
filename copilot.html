<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Calc II Repo Browser</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        line-height: 1.6;
    }
    h1 {
        color: #0a3d62;
    }
    ul {
        padding-left: 20px;
    }
</style>
</head>
<body>

<h1>Calc II Repository Contents</h1>
<p>Generated automatically from <code>github.com/LeachMath/CalcII</code></p>

<div id="content"></div>

<script>
async function loadRepoContents(path = "") {
    const apiUrl = `https://api.github.com/repos/LeachMath/CalcII/contents/${path}`;
    const container = document.getElementById("content");

    try {
        const response = await fetch(apiUrl);
        if (!response.ok) {
            container.innerHTML = `<p>Error loading repository contents.</p>`;
            return;
        }

        const data = await response.json();
        const list = document.createElement("ul");

        data.forEach(item => {
            const li = document.createElement("li");

            if (item.type === "file") {
                // Direct link to GitHub file
                li.innerHTML = `<a href="${item.html_url}" target="_blank">${item.name}</a>`;
            } else if (item.type === "dir") {
                // Make folder clickable to load its contents
                li.innerHTML = `<strong>${item.name}/</strong>`;
                li.style.cursor = "pointer";
                li.onclick = () => loadSubfolder(item.path, li);
            }

            list.appendChild(li);
        });

        // Replace content if at root, otherwise return subtree
        if (path === "") container.innerHTML = "";
        container.appendChild(list);

    } catch (error) {
        container.innerHTML = `<p>Failed to fetch data: ${error}</p>`;
    }
}

async function loadSubfolder(path, liElement) {
    // Prevent expanding twice
    if (liElement.dataset.loaded) return;
    liElement.dataset.loaded = "true";

    const apiUrl = `https://api.github.com/repos/LeachMath/CalcII/contents/${path}`;
    const response = await fetch(apiUrl);
    const data = await response.json();

    const subList = document.createElement("ul");

    data.forEach(item => {
        const subLi = document.createElement("li");

        if (item.type === "file") {
            subLi.innerHTML = `<a href="${item.html_url}" target="_blank">${item.name}</a>`;
        } else if (item.type === "dir") {
            subLi.innerHTML = `<strong>${item.name}/</strong>`;
            subLi.style.cursor = "pointer";
            subLi.onclick = () => loadSubfolder(item.path, subLi);
        }

        subList.appendChild(subLi);
    });

    liElement.appendChild(subList);
}

// Load the root folder on page start
loadRepoContents();
</script>

</body>
</html>
